# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose — Local Development
#
# Usage:
#   docker-compose up --build       # start both services
#   docker-compose up backend       # start backend only
#   docker-compose logs -f frontend # tail frontend logs
#   docker-compose down             # stop & remove containers
#
# Frontend: http://localhost:5174
# Backend:  http://localhost:3000
# ─────────────────────────────────────────────────────────────────────────────
version: '3.8'

services:

  # ── Backend (Node.js / Express) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiny-app-backend
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source for live reload via nodemon
      - ./backend/src:/usr/src/app/src
    restart: unless-stopped

  # ── Frontend (React / Vite dev server) ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev          # Use the 'dev' stage (Vite dev server, not nginx)
    container_name: tiny-app-frontend
    ports:
      - '5174:5174'
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source for hot module replacement (HMR)
      - ./frontend/src:/usr/src/app/src
      - ./frontend/public:/usr/src/app/public
    depends_on:
      - backend
    restart: unless-stopped
