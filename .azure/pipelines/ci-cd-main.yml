# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — MAIN PIPELINE
#
# Triggered on every push to the `main` branch (i.e. after a PR is merged
# from release into main).
#
# Pipeline stages:
#   Stage 1 ─ CI           : Lint → Test → Docker Build & Push → Trivy Scan
#                            (frontend & backend jobs run in parallel)
#   Stage 2 ─ Deploy Stage : ⚠️ MANUAL APPROVAL REQUIRED → deploy to Stage
#   Stage 3 ─ Deploy Prod  : ⚠️ MANUAL APPROVAL REQUIRED → deploy to Prod
#
# Manual approval gates:
#   • Stage → configure approvers in ADO: Pipelines → Environments → stage
#   • Prod  → configure approvers in ADO: Pipelines → Environments → prod
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • Service Connection "azure-service-connection" (Azure Resource Manager)
#   • ADO Environment   "stage"  ← ADD APPROVAL CHECKS HERE
#   • ADO Environment   "prod"   ← ADD APPROVAL CHECKS HERE
#   • App Services: tiny-app-stage-fe, tiny-app-stage-be,
#                   tiny-app-prod-fe,  tiny-app-prod-be
# ═════════════════════════════════════════════════════════════════════════════
trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'prod-$(Build.BuildId)'
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CI: Build, Test, Push & Scan
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: CI
    displayName: '🔨 CI — Build, Test & Push'
    jobs:
      # Frontend and backend CI jobs run in PARALLEL
      - job: Frontend_CI
        displayName: '🖥️ Frontend — Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(feImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(feImageRepo):$(imageTag)'

      - job: Backend_CI
        displayName: '🔧 Backend — Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(beImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(beImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to Stage  ⚠️  MANUAL APPROVAL REQUIRED
#
# The `stage` ADO Environment must have an approval check configured.
# Go to: Pipelines → Environments → stage → Approvals and checks → + Approvals
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Stage
    displayName: '🚀 Deploy — Stage  [⚠️ Approval Required]'
    dependsOn: CI
    condition: succeeded('CI')
    jobs:
      - deployment: Deploy_Frontend_Stage
        displayName: '🖥️ Frontend → Stage'
        environment: 'stage'   # ← Approval gate lives here in ADO portal
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-fe'
                    imageName: '$(feImageRepo):$(imageTag)'

      - deployment: Deploy_Backend_Stage
        displayName: '🔧 Backend → Stage'
        environment: 'stage'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-be'
                    imageName: '$(beImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Production  ⚠️  MANUAL APPROVAL REQUIRED
#
# The `prod` ADO Environment must have an approval check configured.
# Go to: Pipelines → Environments → prod → Approvals and checks → + Approvals
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Prod
    displayName: '🚀 Deploy — Production  [⚠️ Approval Required]'
    dependsOn: Deploy_Stage
    condition: succeeded('Deploy_Stage')
    jobs:
      - deployment: Deploy_Frontend_Prod
        displayName: '🖥️ Frontend → Production'
        environment: 'prod'   # ← Approval gate lives here in ADO portal
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-fe'
                    imageName: '$(feImageRepo):$(imageTag)'

      - deployment: Deploy_Backend_Prod
        displayName: '🔧 Backend → Production'
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-be'
                    imageName: '$(beImageRepo):$(imageTag)'
