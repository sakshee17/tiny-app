# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — MAIN PIPELINE  (Build Once, Promote)
#
# Triggered on every push to the `main` branch.
# Does NOT build any Docker images. Instead it:
#   1. Downloads the image-metadata artifact from the latest CI/CD — Release run
#   2. Retags  qa-{id}  →  prod-{id}  (same binary, new environment tag)
#   3. Deploys prod-{id} to Stage (simulated, manual approval)
#   4. Deploys prod-{id} to Prod  (REAL deploy, manual approval)
#
# Image lineage:
#   dev-42  (built by ci-dev)  →  qa-42  (release)  →  prod-42  (this pipeline)
#
# ⚠️  IMPORTANT: The CI/CD — Release pipeline MUST have at least one successful
#     run before this pipeline can run. If no release artifact exists, the
#     Promote stage will fail.
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • Service Connection "azure-service-connection" (Azure ARM) ← PROD ONLY
#   • ADO Environment   "stage"  ← ADD APPROVAL CHECKS (simulated deploy)
#   • ADO Environment   "prod"   ← ADD APPROVAL CHECKS (REAL deploy)
#   • App Services (PROD ONLY): tiny-app-prod-fe, tiny-app-prod-be
#   • Pipeline resource permission: first run will prompt to allow access to
#     "CI/CD — Release" pipeline artifacts — click Permit to continue.
# ═════════════════════════════════════════════════════════════════════════════

# ── Pipeline resource: references CI/CD — Release for artifact download ──────
# ⚠️  MANUAL STEP: The pipeline name below ('CI/CD — Release') MUST exactly
#     match the name you gave the release pipeline when creating it in ADO.
resources:
  pipelines:
    - pipeline: ci_release        # internal alias
      source: 'CI/CD — Release'  # ← EXACT pipeline name in ADO (case-sensitive)
      trigger: none

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Promote: retag qa-{id} → prod-{id}
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Promote
    displayName: '🏷️ Promote — qa → prod'
    jobs:
      - job: Retag_Images
        displayName: 'Download metadata → Retag → Confirm lineage'
        steps:
          - checkout: none

          # Download image-metadata artifact from the latest CI/CD — Release run
          - download: ci_release
            artifact: image-metadata
            displayName: '⬇️ Download image-metadata from CI/CD — Release'

          # Read the Dev Build ID (same ID carried through from dev → release → main)
          - script: |
              DEV_BUILD_ID=$(cat $(Pipeline.Workspace)/ci_release/image-metadata/build-id.txt)
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Original Dev Build ID   : $DEV_BUILD_ID"
              echo "  Promoting from tag      : qa-$DEV_BUILD_ID"
              echo "  Promoting to tag        : prod-$DEV_BUILD_ID"
              echo "  Lineage: dev-$DEV_BUILD_ID → qa-$DEV_BUILD_ID → prod-$DEV_BUILD_ID"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "##vso[task.setvariable variable=devBuildId]$DEV_BUILD_ID"
              echo "##vso[task.setvariable variable=devBuildId;isOutput=true]$DEV_BUILD_ID"
            name: readMetadata
            displayName: '📖 Read Build ID from Release artifact'

          # Retag frontend: qa-{id} → prod-{id}
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(feImageRepo):qa-$(devBuildId)'
              targetImage: '$(feImageRepo):prod-$(devBuildId)'

          # Retag backend: qa-{id} → prod-{id}
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(beImageRepo):qa-$(devBuildId)'
              targetImage: '$(beImageRepo):prod-$(devBuildId)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to Stage  ⚠️  MANUAL APPROVAL  [🎭 Simulated]
#
# Configure approvers at: Pipelines → Environments → stage → Approvals and checks
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Stage
    displayName: '🚀 Deploy — Stage  [⚠️ Approval + 🎭 Simulated]'
    dependsOn: Promote
    condition: succeeded('Promote')
    variables:
      devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
    jobs:
      - deployment: Deploy_Frontend_Stage
        displayName: '🖥️ Frontend → Stage  (prod-$(devBuildId))'
        environment: 'stage'   # ← Approval gate configured in ADO portal
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-fe'
                    imageName: '$(feImageRepo):prod-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_Stage
        displayName: '🔧 Backend → Stage  (prod-$(devBuildId))'
        environment: 'stage'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-stage-be'
                    imageName: '$(beImageRepo):prod-$(devBuildId)'
                    simulate: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Production  ⚠️  MANUAL APPROVAL  [🚀 REAL DEPLOY]
#
# Configure approvers at: Pipelines → Environments → prod → Approvals and checks
# This is the ONLY stage that deploys to real Azure App Services.
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Prod
    displayName: '🚀 Deploy — Production  [⚠️ Approval + 🚀 REAL]'
    dependsOn: Deploy_Stage
    condition: succeeded('Deploy_Stage')
    variables:
      devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
    jobs:
      - deployment: Deploy_Frontend_Prod
        displayName: '🖥️ Frontend → Production  (prod-$(devBuildId))'
        environment: 'prod'   # ← Approval gate configured in ADO portal
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-fe'
                    imageName: '$(feImageRepo):prod-$(devBuildId)'
                    simulate: false   # ← REAL deploy to Azure App Service

      - deployment: Deploy_Backend_Prod
        displayName: '🔧 Backend → Production  (prod-$(devBuildId))'
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-prod-be'
                    imageName: '$(beImageRepo):prod-$(devBuildId)'
                    simulate: false   # ← REAL deploy to Azure App Service
