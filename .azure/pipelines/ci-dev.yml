# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — DEV PIPELINE
#
# Triggered on every push to any feature/* branch.
#
# Pipeline stages:
#   Stage 1 ─ CI Frontend  : Lint → Test → Docker Build & Push → Trivy Scan
#   Stage 1 ─ CI Backend   : (runs in parallel with Frontend)
#   Stage 2 ─ Deploy Dev   : Deploy both services to the shared Dev App Service
#                            (auto — no approval gate; last push wins)
#
# NOTE: All feature/* branches share ONE Dev environment.
#       This is intentional — Dev is a live preview of the latest feature work.
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • Service Connection "azure-service-connection" (Azure Resource Manager)
#   • ADO Environment   "dev"  (no approval needed)
#   • App Services: tiny-app-dev-fe, tiny-app-dev-be
# ═════════════════════════════════════════════════════════════════════════════
trigger:
  branches:
    include:
      - 'feature/*'
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'dev-$(Build.BuildId)'
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CI: Lint, Test, Build, Push & Scan
# Frontend and Backend run in PARALLEL for faster feedback.
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: CI_Frontend
    displayName: '🖥️ CI — Frontend'
    dependsOn: []   # parallel with CI_Backend
    jobs:
      - job: Frontend_CI
        displayName: 'Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(feImageRepo)'
              imageTag: '$(imageTag)'
              push: true   # push to registry so Dev App Service can pull it

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(feImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
  - stage: CI_Backend
    displayName: '🔧 CI — Backend'
    dependsOn: []   # parallel with CI_Frontend
    jobs:
      - job: Backend_CI
        displayName: 'Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(beImageRepo)'
              imageTag: '$(imageTag)'
              push: true   # push to registry so Dev App Service can pull it

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(beImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to Dev  (auto after both CI stages succeed)
#
# The `dev` ADO Environment has no approval gate — deploys automatically.
# All feature branches share this single Dev environment (last push wins).
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Dev
    displayName: '🚀 Deploy — Dev  [🎭 Simulated]'
    dependsOn:
      - CI_Frontend
      - CI_Backend
    condition: succeeded()
    jobs:
      - deployment: Deploy_Frontend_Dev
        displayName: '🖥️ Frontend → Dev'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-dev-fe'
                    imageName: '$(feImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for Dev

      - deployment: Deploy_Backend_Dev
        displayName: '🔧 Backend → Dev'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-dev-be'
                    imageName: '$(beImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for Dev
