# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — DEV PIPELINE  (Build Once, Promote)
#
# This pipeline is the ONLY place a Docker image is built from source.
# All downstream pipelines (release, main) promote the image produced here
# by retagging — they do NOT rebuild.
#
# Triggered on every push to any feature/* branch.
#
# Pipeline stages:
#   Stage 1 ─ CI Frontend     : Lint → Test → Docker Build & Push → Trivy Scan
#   Stage 1 ─ CI Backend      : (runs in parallel with CI Frontend)
#   Stage 2 ─ Publish Metadata: Write build-id artifact for downstream pipelines
#   Stage 3 ─ Deploy Dev      : Simulated deploy using the just-built image
#
# Image tag convention:
#   dev-{Build.BuildId}  (e.g. dev-42)
#   ↓ promoted by ci-cd-release → qa-42
#   ↓ promoted by ci-cd-main   → prod-42
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • ADO Environment   "dev"  (no approval needed)
# ═════════════════════════════════════════════════════════════════════════════
trigger:
  branches:
    include:
      - 'feature/*'
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'dev-$(Build.BuildId)'
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CI: Build the one-and-only image  (parallel for speed)
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: CI_Frontend
    displayName: '🖥️ CI — Frontend'
    dependsOn: []
    jobs:
      - job: Frontend_CI
        displayName: 'Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(feImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(feImageRepo):$(imageTag)'

  - stage: CI_Backend
    displayName: '🔧 CI — Backend'
    dependsOn: []
    jobs:
      - job: Backend_CI
        displayName: 'Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(beImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(beImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Publish Image Metadata
#
# Writes the Build ID to a pipeline artifact so that the release and main
# pipelines can download it and retag the correct image for promotion.
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Publish_Metadata
    displayName: '📋 Publish Image Metadata'
    dependsOn:
      - CI_Frontend
      - CI_Backend
    condition: succeeded()
    jobs:
      - job: Publish_Metadata
        displayName: 'Write & publish image-metadata artifact'
        steps:
          - checkout: none

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/image-metadata
              echo "$(Build.BuildId)" \
                > $(Build.ArtifactStagingDirectory)/image-metadata/build-id.txt
              echo "dev-$(Build.BuildId)" \
                > $(Build.ArtifactStagingDirectory)/image-metadata/image-tag.txt
              echo "Contents of image-metadata artifact:"
              cat $(Build.ArtifactStagingDirectory)/image-metadata/build-id.txt
              cat $(Build.ArtifactStagingDirectory)/image-metadata/image-tag.txt
            displayName: '📝 Write metadata files'

          - task: PublishPipelineArtifact@1
            displayName: '📦 Publish image-metadata artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/image-metadata'
              artifact: 'image-metadata'
              publishLocation: 'pipeline'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to Dev  (simulated, auto after metadata is published)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_Dev
    displayName: '🚀 Deploy — Dev  [🎭 Simulated]'
    dependsOn: Publish_Metadata
    condition: succeeded()
    jobs:
      - deployment: Deploy_Frontend_Dev
        displayName: '🖥️ Frontend → Dev'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-dev-fe'
                    imageName: '$(feImageRepo):$(imageTag)'
                    simulate: true

      - deployment: Deploy_Backend_Dev
        displayName: '🔧 Backend → Dev'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-dev-be'
                    imageName: '$(beImageRepo):$(imageTag)'
                    simulate: true
