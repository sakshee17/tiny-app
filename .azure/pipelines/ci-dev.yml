# ═════════════════════════════════════════════════════════════════════════════
# CI — DEV PIPELINE
#
# Triggered on every push to any feature/* branch.
# Runs lint + unit tests + Docker build (no push) for both services.
# This is a pure CI pipeline — nothing is deployed or published.
#
# Frontend and Backend CI stages run in PARALLEL for faster feedback.
# Within each stage, steps run SEQUENTIALLY so failures short-circuit early.
#
# Required Azure DevOps setup:
#   • Variable Group "docker-hub-credentials" with DOCKER_USERNAME
# ═════════════════════════════════════════════════════════════════════════════
trigger:
  branches:
    include:
      - 'feature/*'
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'dev-$(Build.BuildId)'

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND CI  (parallel with Backend)
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: CI_Frontend
    displayName: '🖥️ CI — Frontend'
    dependsOn: []
    jobs:
      - job: Frontend_CI
        displayName: 'Lint → Test → Docker Build'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(DOCKER_USERNAME)/tiny-app-frontend'
              imageTag: '$(imageTag)'
              push: false   # dev branch: build locally, do NOT push to registry

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND CI  (parallel with Frontend)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: CI_Backend
    displayName: '🔧 CI — Backend'
    dependsOn: []
    jobs:
      - job: Backend_CI
        displayName: 'Lint → Test → Docker Build'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(DOCKER_USERNAME)/tiny-app-backend'
              imageTag: '$(imageTag)'
              push: false   # dev branch: build locally, do NOT push to registry
