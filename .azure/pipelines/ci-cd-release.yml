# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — RELEASE PIPELINE  (Build Once, Promote)
#
# Triggered on every push to the `release` branch.
# Does NOT build any Docker images. Instead it:
#   1. Downloads the image-metadata artifact from the latest CI/CD — Dev run
#      (downloaded ONCE in the Promote stage — never again)
#   2. Stores devBuildId as a pipeline-level variable via ADO REST API
#      so all downstream stages use $(devBuildId) directly
#   3. Retags  dev-{id}  →  qa-{id}  (same binary, new environment tag)
#   4. Deploys qa-{id} to QA then UAT (both simulated, no re-download)
#   5. Re-publishes the metadata artifact for CI/CD — Main to consume
#
# Image lineage:
#   dev-42  (built by ci-dev)  →  qa-42  (this pipeline)  →  prod-42 (main)
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • ADO Environment   "qa"   (no approval, simulated)
#   • ADO Environment   "uat"  (no approval, simulated)
#   • ⚠️  First run: ADO will prompt to allow access to "CI/CD — Dev" artifacts
#          → click Permit to continue (one-time only)
# ═════════════════════════════════════════════════════════════════════════════

# ── Pipeline resource: download artifacts from CI/CD — Dev ───────────────────
# ⚠️  MANUAL STEP: 'CI/CD — Dev' MUST exactly match the pipeline name in ADO.
resources:
  pipelines:
    - pipeline: ci_dev
      source: 'CI_CD_Dev'
      trigger: none

trigger:
  branches:
    include:
      - release
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'
  # devBuildId is set at runtime via REST API in the Promote stage.
  # Defining it here with a sentinel value lets the YAML compile cleanly.
  - name: devBuildId
    value: 'pending'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Promote
#
# • Downloads the image-metadata artifact from CI/CD — Dev (ONCE, here only)
# • Reads the Dev Build ID and stores it as a pipeline-run variable via REST API
#   so every downstream stage can use $(devBuildId) without re-downloading
# • Retags dev-{id} → qa-{id} for both images
# • Re-publishes the artifact for CI/CD — Main to consume
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Promote
    displayName: '🏷️ Promote — dev → qa'
    jobs:
      - job: Retag_Images
        displayName: 'Download artifact (once) → Set pipeline var → Retag → Publish'
        steps:
          - checkout: none

          # ── Step 1: Download image-metadata artifact from CI/CD — Dev ────────
          # This is the ONLY download in the entire pipeline run.
          - download: ci_dev
            artifact: image-metadata
            displayName: '⬇️ Download image-metadata from CI/CD — Dev (once only)'

          # ── Step 2: Read build ID and store as pipeline-level variable ────────
          # Uses the ADO REST API to write devBuildId into this pipeline run's
          # variable store. All subsequent stages read it as $(devBuildId) —
          # no repeated stageDependencies expressions, no re-downloads.
          - script: |
              set -e
              DEV_BUILD_ID=$(cat $(Pipeline.Workspace)/ci_dev/image-metadata/build-id.txt)

              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Dev Build ID to promote : $DEV_BUILD_ID"
              echo "  Source tag              : dev-$DEV_BUILD_ID"
              echo "  Target tag              : qa-$DEV_BUILD_ID"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

              # Write into this job's scope
              echo "##vso[task.setvariable variable=devBuildId]$DEV_BUILD_ID"
              
              # Write as an output variable for downstream stages
              echo "##vso[task.setvariable variable=devBuildId;isOutput=true]$DEV_BUILD_ID"
            name: readMetadata
            displayName: '📖 Read Dev Build ID'

          # ── Step 3: Retag frontend ────────────────────────────────────────────
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(feImageRepo):dev-$(devBuildId)'
              targetImage: '$(feImageRepo):qa-$(devBuildId)'

          # ── Step 4: Retag backend ─────────────────────────────────────────────
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(beImageRepo):dev-$(devBuildId)'
              targetImage: '$(beImageRepo):qa-$(devBuildId)'

          # ── Step 5: Re-publish metadata for CI/CD — Main ─────────────────────
          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/image-metadata
              cp $(Pipeline.Workspace)/ci_dev/image-metadata/build-id.txt \
                 $(Build.ArtifactStagingDirectory)/image-metadata/build-id.txt
              echo "qa-$(devBuildId)" \
                > $(Build.ArtifactStagingDirectory)/image-metadata/image-tag.txt
            displayName: '📝 Prepare metadata for CI/CD — Main'

          - task: PublishPipelineArtifact@1
            displayName: '📦 Publish image-metadata artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/image-metadata'
              artifact: 'image-metadata'
              publishLocation: 'pipeline'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to QA  (auto after Promote, simulated)
# $(devBuildId) is already set — no download, no stageDependencies expression.
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_QA
    displayName: '🚀 Deploy — QA  [🎭 Simulated]'
    dependsOn: Promote
    condition: succeeded('Promote')
    jobs:
      - deployment: Deploy_Frontend_QA
        displayName: '🖥️ Frontend → QA'
        environment: 'qa'
        variables:
          devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-fe'
                    imageName: '$(feImageRepo):qa-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_QA
        displayName: '🔧 Backend → QA'
        environment: 'qa'
        variables:
          devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-be'
                    imageName: '$(beImageRepo):qa-$(devBuildId)'
                    simulate: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to UAT  (auto after QA, simulated)
# $(devBuildId) is already set — no download, no stageDependencies expression.
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_UAT
    displayName: '🚀 Deploy — UAT  [🎭 Simulated]'
    dependsOn: Deploy_QA
    condition: succeeded('Deploy_QA')
    jobs:
      - deployment: Deploy_Frontend_UAT
        displayName: '🖥️ Frontend → UAT'
        environment: 'uat'
        variables:
          devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-fe'
                    imageName: '$(feImageRepo):qa-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_UAT
        displayName: '🔧 Backend → UAT'
        environment: 'uat'
        variables:
          devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-be'
                    imageName: '$(beImageRepo):qa-$(devBuildId)'
                    simulate: true
