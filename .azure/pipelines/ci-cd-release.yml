# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — RELEASE PIPELINE  (Build Once, Promote)
#
# Triggered on every push to the `release` branch.
# Does NOT build any Docker images. Instead it:
#   1. Downloads the image-metadata artifact from the latest CI/CD — Dev run
#   2. Retags  dev-{id}  →  qa-{id}  (same binary, new environment tag)
#   3. Deploys qa-{id} to QA and UAT (both simulated)
#   4. Re-publishes the metadata artifact for CI/CD — Main to consume
#
# Image lineage:
#   dev-42  (built by ci-dev)  →  qa-42  (this pipeline)  →  prod-42 (main)
#
# ⚠️  IMPORTANT: The CI/CD — Dev pipeline MUST have at least one successful
#     run before this pipeline can run. If no dev artifact exists, the
#     Promote stage will fail.
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • ADO Environment   "qa"   (no approval, simulated)
#   • ADO Environment   "uat"  (no approval, simulated)
#   • Pipeline resource permission: first run will prompt to allow access to
#     "CI/CD — Dev" pipeline artifacts — click Permit to continue.
# ═════════════════════════════════════════════════════════════════════════════

# ── Pipeline resource: references CI/CD — Dev for artifact download ──────────
# ⚠️  MANUAL STEP: The pipeline name below ('CI/CD — Dev') MUST exactly match
#     the name you gave the dev pipeline when creating it in Azure DevOps.
resources:
  pipelines:
    - pipeline: ci_dev          # internal alias used in `download:` steps
      source: 'CI/CD — Dev'    # ← EXACT pipeline name in ADO (case-sensitive)
      trigger: none             # this pipeline triggers on branch push, not pipeline completion

trigger:
  branches:
    include:
      - release
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Promote: retag dev-{id} → qa-{id}
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Promote
    displayName: '🏷️ Promote — dev → qa'
    jobs:
      - job: Retag_Images
        displayName: 'Download metadata → Retag → Publish metadata'
        steps:
          - checkout: none

          # Download image-metadata artifact from the latest CI/CD — Dev run
          - download: ci_dev
            artifact: image-metadata
            displayName: '⬇️ Download image-metadata from CI/CD — Dev'

          # Read the Dev Build ID and set it as a job-scoped + stage-output variable
          - script: |
              DEV_BUILD_ID=$(cat $(Pipeline.Workspace)/ci_dev/image-metadata/build-id.txt)
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "  Dev Build ID to promote: $DEV_BUILD_ID"
              echo "  Source tag: dev-$DEV_BUILD_ID"
              echo "  Target tag: qa-$DEV_BUILD_ID"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              # Make available in this job's subsequent steps
              echo "##vso[task.setvariable variable=devBuildId]$DEV_BUILD_ID"
              # Make available in downstream stages via stageDependencies
              echo "##vso[task.setvariable variable=devBuildId;isOutput=true]$DEV_BUILD_ID"
            name: readMetadata
            displayName: '📖 Read Dev Build ID'

          # Retag frontend: dev-{id} → qa-{id}
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(feImageRepo):dev-$(devBuildId)'
              targetImage: '$(feImageRepo):qa-$(devBuildId)'

          # Retag backend: dev-{id} → qa-{id}
          - template: ../templates/steps-docker-retag-push.yml
            parameters:
              sourceImage: '$(beImageRepo):dev-$(devBuildId)'
              targetImage: '$(beImageRepo):qa-$(devBuildId)'

          # Re-publish the same build-id.txt so CI/CD — Main can download it
          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/image-metadata
              cp $(Pipeline.Workspace)/ci_dev/image-metadata/build-id.txt \
                 $(Build.ArtifactStagingDirectory)/image-metadata/build-id.txt
              echo "qa-$(devBuildId)" \
                > $(Build.ArtifactStagingDirectory)/image-metadata/image-tag.txt
              echo "Metadata to publish:"
              cat $(Build.ArtifactStagingDirectory)/image-metadata/build-id.txt
            displayName: '📝 Prepare metadata for CI/CD — Main'

          - task: PublishPipelineArtifact@1
            displayName: '📦 Publish image-metadata artifact'
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/image-metadata'
              artifact: 'image-metadata'
              publishLocation: 'pipeline'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to QA  (auto after Promote, simulated)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_QA
    displayName: '🚀 Deploy — QA  [🎭 Simulated]'
    dependsOn: Promote
    condition: succeeded('Promote')
    variables:
      # Retrieve the Dev Build ID from the Promote stage output
      devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
    jobs:
      - deployment: Deploy_Frontend_QA
        displayName: '🖥️ Frontend → QA  (qa-$(devBuildId))'
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-fe'
                    imageName: '$(feImageRepo):qa-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_QA
        displayName: '🔧 Backend → QA  (qa-$(devBuildId))'
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-be'
                    imageName: '$(beImageRepo):qa-$(devBuildId)'
                    simulate: true

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to UAT  (auto after QA, simulated)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_UAT
    displayName: '🚀 Deploy — UAT  [🎭 Simulated]'
    dependsOn: Deploy_QA
    condition: succeeded('Deploy_QA')
    variables:
      devBuildId: $[ stageDependencies.Promote.Retag_Images.outputs['readMetadata.devBuildId'] ]
    jobs:
      - deployment: Deploy_Frontend_UAT
        displayName: '🖥️ Frontend → UAT  (qa-$(devBuildId))'
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-fe'
                    imageName: '$(feImageRepo):qa-$(devBuildId)'
                    simulate: true

      - deployment: Deploy_Backend_UAT
        displayName: '🔧 Backend → UAT  (qa-$(devBuildId))'
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-be'
                    imageName: '$(beImageRepo):qa-$(devBuildId)'
                    simulate: true
