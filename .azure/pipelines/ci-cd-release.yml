# ═════════════════════════════════════════════════════════════════════════════
# CI/CD — RELEASE PIPELINE
#
# Triggered on every push to the `release` branch (i.e. after a PR is merged
# from feature/* into release).
#
# Pipeline stages:
#   Stage 1 ─ CI          : Lint → Test → Docker Build & Push → Trivy Scan
#                           (frontend & backend jobs run in parallel)
#   Stage 2 ─ Deploy QA   : Deploy to QA App Services (auto after CI)
#   Stage 3 ─ Deploy UAT  : Deploy to UAT App Services (auto after QA)
#
# Manual approval gates:
#   • QA  → no gate (auto)
#   • UAT → no gate (auto after QA succeeds)
#   (UAT → Stage transition is managed by the main pipeline)
#
# Required Azure DevOps setup:
#   • Variable Group  "docker-hub-credentials"  → DOCKER_USERNAME, DOCKER_PASSWORD
#   • Service Connection "docker-hub-connection" (Docker Hub)
#   • ADO Environment   "qa"   (no approval, simulated deploy)
#   • ADO Environment   "uat"  (no approval, simulated deploy)
#   NOTE: azure-service-connection NOT needed — QA/UAT deploys are simulated
# ═════════════════════════════════════════════════════════════════════════════
trigger:
  branches:
    include:
      - release
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'release-$(Build.BuildId)'
  - name: feImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-frontend'
  - name: beImageRepo
    value: '$(DOCKER_USERNAME)/tiny-app-backend'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CI: Build, Test, Push & Scan
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: CI
    displayName: '🔨 CI — Build, Test & Push'
    jobs:
      # Frontend and backend CI jobs run in PARALLEL
      - job: Frontend_CI
        displayName: '🖥️ Frontend — Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(feImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(feImageRepo):$(imageTag)'

      - job: Backend_CI
        displayName: '🔧 Backend — Lint → Test → Push → Scan'
        steps:
          - checkout: self

          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(beImageRepo)'
              imageTag: '$(imageTag)'
              push: true

          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(beImageRepo):$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Deploy to QA  (auto-triggered after CI succeeds)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_QA
    displayName: '🚀 Deploy — QA  [🎭 Simulated]'
    dependsOn: CI
    condition: succeeded('CI')
    jobs:
      - deployment: Deploy_Frontend_QA
        displayName: '🖥️ Frontend → QA'
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-fe'
                    imageName: '$(feImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for QA

      - deployment: Deploy_Backend_QA
        displayName: '🔧 Backend → QA'
        environment: 'qa'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-qa-be'
                    imageName: '$(beImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for QA

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Deploy to UAT  (auto-triggered after QA succeeds)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Deploy_UAT
    displayName: '🚀 Deploy — UAT  [🎭 Simulated]'
    dependsOn: Deploy_QA
    condition: succeeded('Deploy_QA')
    jobs:
      - deployment: Deploy_Frontend_UAT
        displayName: '🖥️ Frontend → UAT'
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-fe'
                    imageName: '$(feImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for UAT

      - deployment: Deploy_Backend_UAT
        displayName: '🔧 Backend → UAT'
        environment: 'uat'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: ../templates/steps-appservice-deploy.yml
                  parameters:
                    appName: 'tiny-app-uat-be'
                    imageName: '$(beImageRepo):$(imageTag)'
                    simulate: true   # No real infra needed for UAT
