# ═════════════════════════════════════════════════════════════════════════════
# PR VALIDATION PIPELINE
#
# Triggered automatically on every Pull Request targeting:
#   • release  (feature/* → release)
#   • main     (release  → main)
#
# What it does (frontend & backend run in parallel):
#   1. Lint   — ESLint
#   2. Test   — unit tests (vitest / jest)
#   3. Build  — Docker build (no push)  +  Trivy security scan
#
# Required Azure DevOps setup:
#   • Variable Group "docker-hub-credentials" with DOCKER_USERNAME
#   • GitHub service connection (configured when creating the pipeline)
# ═════════════════════════════════════════════════════════════════════════════
trigger: none   # only triggered via PR, never on direct push

pr:
  branches:
    include:
      - release
      - main
  paths:
    exclude:
      - '**/*.md'
      - '.azure/README.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: docker-hub-credentials
  - name: imageTag
    value: 'pr-$(System.PullRequest.PullRequestNumber)-$(Build.BuildId)'

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND  (runs in parallel with Backend stage)
# ─────────────────────────────────────────────────────────────────────────────
stages:
  - stage: Validate_Frontend
    displayName: '🖥️ PR Validate — Frontend'
    dependsOn: []   # explicit: run in parallel with backend stage
    jobs:
      - job: Lint_Frontend
        displayName: 'Lint'
        steps:
          - checkout: self
          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'frontend'

      - job: Test_Frontend
        displayName: 'Unit Tests'
        steps:
          - checkout: self
          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'frontend'

      - job: Build_Scan_Frontend
        displayName: 'Docker Build + Trivy Scan'
        steps:
          - checkout: self
          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'frontend'
              imageRepository: '$(DOCKER_USERNAME)/tiny-app-frontend'
              imageTag: '$(imageTag)'
              push: false
          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(DOCKER_USERNAME)/tiny-app-frontend:$(imageTag)'

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND  (runs in parallel with Frontend stage)
# ─────────────────────────────────────────────────────────────────────────────
  - stage: Validate_Backend
    displayName: '🔧 PR Validate — Backend'
    dependsOn: []   # explicit: run in parallel with frontend stage
    jobs:
      - job: Lint_Backend
        displayName: 'Lint'
        steps:
          - checkout: self
          - template: ../templates/steps-lint.yml
            parameters:
              workingDirectory: 'backend'

      - job: Test_Backend
        displayName: 'Unit Tests'
        steps:
          - checkout: self
          - template: ../templates/steps-test.yml
            parameters:
              workingDirectory: 'backend'

      - job: Build_Scan_Backend
        displayName: 'Docker Build + Trivy Scan'
        steps:
          - checkout: self
          - template: ../templates/steps-docker-build-push.yml
            parameters:
              service: 'backend'
              imageRepository: '$(DOCKER_USERNAME)/tiny-app-backend'
              imageTag: '$(imageTag)'
              push: false
          - template: ../templates/steps-security-scan.yml
            parameters:
              imageName: '$(DOCKER_USERNAME)/tiny-app-backend:$(imageTag)'
