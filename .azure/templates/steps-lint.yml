# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: ESLint
#
# Installs dependencies and runs ESLint for the specified service.
# Called from: pr-validation.yml, ci-dev.yml, ci-cd-release.yml, ci-cd-main.yml
#
# Parameters:
#   workingDirectory  — relative path to service root (e.g. 'frontend', 'backend')
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: workingDirectory
    type: string

steps:
  - script: npm ci
    workingDirectory: ${{ parameters.workingDirectory }}
    displayName: '📦 Install dependencies [${{ parameters.workingDirectory }}]'

  - script: npm run lint
    workingDirectory: ${{ parameters.workingDirectory }}
    displayName: '🔍 ESLint [${{ parameters.workingDirectory }}]'
