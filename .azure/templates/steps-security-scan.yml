# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Trivy Container Security Scan
#
# Downloads and runs Trivy to scan a Docker image for known vulnerabilities.
# Fails the pipeline if vulnerabilities at or above the severity threshold
# are found (controlled via exitCode parameter).
#
# Parameters:
#   imageName          — full image reference to scan (e.g. 'user/repo:tag')
#   severityThreshold  — comma-separated severity levels (default: CRITICAL,HIGH)
#   exitCode           — 1 = fail on findings, 0 = report only (default: 1)
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: imageName
    type: string
  - name: severityThreshold
    type: string
    default: 'CRITICAL,HIGH'
  - name: exitCode
    type: number
    default: 1

steps:
  - script: |
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
        | sh -s -- -b /usr/local/bin
      trivy --version
    displayName: '⬇️ Install Trivy'

  - script: |
      trivy image \
        --exit-code ${{ parameters.exitCode }} \
        --severity "${{ parameters.severityThreshold }}" \
        --no-progress \
        --format table \
        "${{ parameters.imageName }}"
    displayName: '🔒 Trivy scan — ${{ parameters.imageName }}'
