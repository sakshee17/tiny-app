# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Docker Retag & Push  (Build Once, Promote pattern)
#
# Pulls an already-published image, retags it with an environment-scoped tag,
# and pushes the new tag. No Dockerfile, no source code — same binary,
# new tag.
#
# Tag lineage example:
#   dev-42  →  qa-42  →  prod-42   (all point to the identical image layers)
#
# Parameters:
#   sourceImage               — full image ref to pull  (e.g. 'user/repo:dev-42')
#   targetImage               — full image ref to push  (e.g. 'user/repo:qa-42')
#   containerRegistryConnection — ADO Docker Hub service connection
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: sourceImage
    type: string
  - name: targetImage
    type: string
  - name: containerRegistryConnection
    type: string
    default: 'docker-hub-connection'

steps:
  - task: Docker@2
    displayName: '🔑 Docker Hub login'
    inputs:
      command: login
      containerRegistry: ${{ parameters.containerRegistryConnection }}

  - script: |
      set -e
      echo "⬇️  Pulling source image..."
      docker pull "${{ parameters.sourceImage }}"

      echo "🏷️  Retagging..."
      docker tag "${{ parameters.sourceImage }}" "${{ parameters.targetImage }}"

      echo "⬆️  Pushing promoted image..."
      docker push "${{ parameters.targetImage }}"

      echo ""
      echo "✅ Promote complete!"
      echo "   Source : ${{ parameters.sourceImage }}"
      echo "   Target : ${{ parameters.targetImage }}"
    displayName: '🏷️ Retag & Push  [${{ parameters.sourceImage }} → ${{ parameters.targetImage }}]'
