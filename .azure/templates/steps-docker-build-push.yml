# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Docker Build (and optionally Push)
#
# Builds the Docker image for a service. When push=true, uses buildAndPush
# via a Docker Hub service connection. When push=false, builds locally only
# (useful for PR validation and security scanning without polluting the registry).
#
# Prerequisites (Azure DevOps):
#   - A Docker Hub service connection named as per `containerRegistryConnection`
#     (default: 'docker-hub-connection'). Create at:
#     Project Settings → Service connections → New → Docker Registry → Docker Hub
#
# Parameters:
#   service                    — subfolder name: 'frontend' or 'backend'
#   imageRepository            — Docker Hub repo path (e.g. 'myuser/tiny-app-frontend')
#   imageTag                   — image tag to apply (e.g. '$(Build.BuildId)')
#   push                       — true = buildAndPush | false = local build only
#   containerRegistryConnection — ADO service connection name for Docker Hub
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: service
    type: string
  - name: imageRepository
    type: string
  - name: imageTag
    type: string
  - name: push
    type: boolean
    default: false
  - name: containerRegistryConnection
    type: string
    default: 'docker-hub-connection'

steps:
  # ── Build only (no push) — for PR validation, CI dev, security scanning ──
  - ${{ if eq(parameters.push, false) }}:
    - task: Docker@2
      displayName: '🐳 Build — ${{ parameters.service }}'
      inputs:
        command: build
        dockerfile: '${{ parameters.service }}/Dockerfile'
        buildContext: '${{ parameters.service }}'
        repository: ${{ parameters.imageRepository }}
        tags: ${{ parameters.imageTag }}

  # ── Build + Push — for release and main branches ──────────────────────────
  - ${{ if eq(parameters.push, true) }}:
    - task: Docker@2
      displayName: '🐳 Build & Push — ${{ parameters.service }}'
      inputs:
        command: buildAndPush
        containerRegistry: ${{ parameters.containerRegistryConnection }}
        dockerfile: '${{ parameters.service }}/Dockerfile'
        buildContext: '${{ parameters.service }}'
        repository: ${{ parameters.imageRepository }}
        tags: ${{ parameters.imageTag }}
