# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Unit Tests
#
# Installs dependencies and runs unit tests for the specified service.
# Optionally publishes JUnit-formatted test results to Azure DevOps.
#
# NOTE: To enable JUnit result publishing (publishResults: true), your test
# runner must output XML results:
#   - Frontend (vitest): add `--reporter=junit --outputFile=test-results.xml`
#   - Backend  (jest):   install `jest-junit` and configure in package.json
#
# Parameters:
#   workingDirectory  — relative path to service root (e.g. 'frontend', 'backend')
#   testResultsFile   — glob for JUnit XML output (default: 'test-results.xml')
#   publishResults    — publish results to Azure DevOps UI (default: false)
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: workingDirectory
    type: string
  - name: testResultsFile
    type: string
    default: 'test-results.xml'
  - name: publishResults
    type: boolean
    default: false

steps:
  - script: npm ci
    workingDirectory: ${{ parameters.workingDirectory }}
    displayName: '📦 Install dependencies [${{ parameters.workingDirectory }}]'

  - script: npm run test
    workingDirectory: ${{ parameters.workingDirectory }}
    displayName: '🧪 Unit tests [${{ parameters.workingDirectory }}]'

  - ${{ if eq(parameters.publishResults, true) }}:
    - task: PublishTestResults@2
      displayName: '📊 Publish test results [${{ parameters.workingDirectory }}]'
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: ${{ parameters.testResultsFile }}
        searchFolder: '$(System.DefaultWorkingDirectory)/${{ parameters.workingDirectory }}'
        failTaskOnFailedTests: true
        mergeTestResults: true
