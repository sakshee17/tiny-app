# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Azure App Service Container Deploy
#
# Deploys a Docker container image to an Azure App Service (Web App for Containers).
# Uses the AzureWebAppContainer@1 task which makes REST API calls to Azure —
# no source checkout is needed in the deployment job.
#
# Prerequisites (Azure DevOps):
#   - An Azure Resource Manager service connection named as per `azureSubscription`
#     (default: 'azure-service-connection'). Create at:
#     Project Settings → Service connections → New → Azure Resource Manager
#   - The target App Service must already exist and be configured for containers.
#
# Parameters:
#   appName           — Azure App Service name (e.g. 'tiny-app-qa-fe')
#   imageName         — full Docker image reference incl. tag
#                       (e.g. 'myuser/tiny-app-frontend:release-42')
#   azureSubscription — ADO service connection name for Azure
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: appName
    type: string
  - name: imageName
    type: string
  - name: azureSubscription
    type: string
    default: 'azure-service-connection'

steps:
  - task: AzureWebAppContainer@1
    displayName: '🚀 Deploy to App Service [${{ parameters.appName }}]'
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      appName: ${{ parameters.appName }}
      containers: ${{ parameters.imageName }}
