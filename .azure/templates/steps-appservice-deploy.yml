# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template: Azure App Service Container Deploy
#
# When simulate=true  → prints what WOULD be deployed (no real infra needed).
#                       Perfect for Dev/QA/UAT/Stage learning environments.
# When simulate=false → performs a real AzureWebAppContainer@1 deploy to Azure.
#                       Used for Production only.
#
# Parameters:
#   appName           — Azure App Service name (e.g. 'tiny-app-prod-fe')
#   imageName         — Full Docker image reference incl. tag
#                       (e.g. 'myuser/tiny-app-frontend:prod-42')
#   azureSubscription — ADO service connection name for Azure (prod only)
#   simulate          — true = echo only | false = real deploy (default: false)
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: appName
    type: string
  - name: imageName
    type: string
  - name: azureSubscription
    type: string
    default: 'azure-service-connection'
  - name: simulate
    type: boolean
    default: false

steps:
  # ── Simulated deploy (Dev / QA / UAT / Stage) ─────────────────────────────
  - ${{ if eq(parameters.simulate, true) }}:
    - script: |
        echo "╔══════════════════════════════════════════════════════╗"
        echo "║            🎭  SIMULATED DEPLOYMENT                  ║"
        echo "╠══════════════════════════════════════════════════════╣"
        echo "║  App Service : ${{ parameters.appName }}"
        echo "║  Image       : ${{ parameters.imageName }}"
        echo "╠══════════════════════════════════════════════════════╣"
        echo "║  ✅ In production this would call AzureWebAppContainer@1"
        echo "║  ✅ No real Azure infrastructure required             ║"
        echo "╚══════════════════════════════════════════════════════╝"
      displayName: '🎭 Simulated Deploy → ${{ parameters.appName }}'

  # ── Real deploy (Production only) ─────────────────────────────────────────
  - ${{ if eq(parameters.simulate, false) }}:
    - task: AzureWebAppContainer@1
      displayName: '🚀 Deploy to App Service [${{ parameters.appName }}]'
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        appName: ${{ parameters.appName }}
        containers: ${{ parameters.imageName }}
